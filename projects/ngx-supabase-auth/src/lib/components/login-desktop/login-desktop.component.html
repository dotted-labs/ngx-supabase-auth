  <section class="relative flex flex-col items-center gap-6 text-center px-4">
    @if (store.loading()) {
      <div class="alert">Verificando autenticación...</div>
    }

    @if (store.error()) {
      <div class="alert alert-error">{{ store.error() }}</div>
    }

    @if (store.user() && !store.loading() && !store.error()) {
      <div class="alert alert-success">¡Autenticación exitosa!</div>
      <p>Bienvenido, {{ store.user()?.email }}</p>
    }
    <div class="flex flex-col items-center justify-center gap-3 w-full">
      <button class="btn btn-primary w-[320px]" (click)="login()">Iniciar sesión</button>
      <button class="btn btn-secondary w-[320px]" (click)="signup()">Registrarse</button>
    </div>
  </section>

@if (authStore.loading()) {
  <div class="alert" i18n="@@auth.desktop.verifying">Verifying authentication...</div>
}

@if (authStore.error()) {
  <div class="alert alert-error">{{ authStore.error() }}</div>
}

@if (authStore.user() && !authStore.loading() && !authStore.error()) {
  <div class="alert alert-success" i18n="@@auth.desktop.authSuccess">Authentication successful!</div>
  <p i18n="@@auth.desktop.welcome">Welcome, {{ authStore.user()?.email }}</p>

  <button class="btn btn-primary" (click)="redirectToDesktop()" i18n="@@auth.desktop.signInApp">Sign in to the app</button>
}

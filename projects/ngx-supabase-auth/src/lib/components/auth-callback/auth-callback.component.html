<section class="flex flex-col items-center justify-center min-h-[300px] gap-4 p-6">
  @if (error()) {
    <div class="flex flex-col items-center gap-4 text-center max-w-md">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
      </svg>
      <h2 class="text-xl font-semibold text-error">Authentication Error</h2>
      <p class="text-base-content/70">{{ error() }}</p>
      <a [routerLink]="loginPath()" class="btn btn-primary mt-2">Back to Login</a>
    </div>
  } @else {
    <span class="loading loading-spinner loading-lg text-primary"></span>
    <p class="text-base-content/70">Completing authentication...</p>
  }
</section>
